<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starr - Create Account</title>

  
  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

  
 <header class="bg-success py-3 shadow-sm">
  <div class="container text-center">
    <img src="../img/starr.jpg" alt="Starr Logo" class="img-fluid logo-hover" style="max-width: 80px;">
  </div>
</header>


  
  <section class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card p-4 shadow-lg" style="max-width: 450px; width: 100%; border-top: 5px solid #28a745;">
      <h2 class="text-center mb-4 text-success">Create an Account</h2>

      
      <form>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Enter your password">
        </div>

        <div class="mb-3">
          <label class="form-label">Age</label>
          <input type="number" class="form-control" placeholder="Enter your age">
        </div>

        <div class="mb-3">
          <label class="form-label">Type of User</label>
          <select class="form-select">
            <option value="">Select type</option>
            <option>Teacher</option>
            <option>Parent</option>
            <option>Kid</option>
          </select>
        </div>

        <button type="submit" class="btn btn-success w-100">Sign Up</button>
      </form>
      

      <p class="text-center mt-3">
        Already have an account? 
        
        <a href="../front-office/login.html" class="text-success fw-bold">Login here!</a>
      </p>
    </div>
  </section>

 
  <footer class="bg-success text-white text-center py-3 mt-auto">
    
    <p>Contact us at: <a href="mailto:contact@starr.com" class="text-white fw-bold">contact@starr.com</a></p>
    <p>&copy; 2025 Starr. All rights reserved.</p>
    
  </footer>

  
  <script src="../js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
