<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starr - Login</title>


  <link href="../css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

 
 <header class="bg-success py-3 shadow-sm">
  <div class="container d-flex align-items-center">
    <img src="../img/starr.jpg" alt="Starr Logo" class="img-fluid me-2 logo-hover" style="max-width: 80px;">
    <h1 class="text-white fw-bold m-0">What you don't see, we keep away.</h1>
  </div>
</header>



 
  <section class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card p-4 shadow-lg" style="max-width: 400px; width: 100%; border-top: 5px solid #28a745;">
      <h2 class="text-center mb-4 text-success">Login</h2>

      
      <form>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Enter your password">
        </div>

        <button type="submit" class="btn btn-success w-100">Login</button>
      </form>
     

      <p class="text-center mt-3">
        New here? 
        
        <a href="../back-office/signup.html" class="text-success fw-bold">Create an account!</a>
      </p>
    </div>
  </section>

  
  <footer class="bg-success text-white text-center py-3 mt-auto">
   
    <p>Contact us at: <a href="mailto:contact@starr.com" class="text-white fw-bold">contact.starr@proton.me</a></p>
    <p>&copy; 2025 Starr. All rights reserved.</p>
    
  </footer>

  
  <script src="../js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
